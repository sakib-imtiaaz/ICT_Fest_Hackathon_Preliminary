$kind: http-request
name: Create Room
method: POST
url: '{{base_url}}/rooms'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "name": "Conference Room A",
      "capacity": 10,
      "hourly_rate_cents": 5000
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Response has room id and org_id", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("id");
        pm.expect(json).to.have.property("org_id");
        pm.expect(json.id).to.be.a("number");
      });

      pm.test("Room fields match request", function () {
        const json = pm.response.json();
        pm.expect(json.name).to.eql("Conference Room A");
        pm.expect(json.capacity).to.eql(10);
        pm.expect(json.hourly_rate_cents).to.eql(5000);
      });

      // Save room_id for use in Bookings requests
      const json = pm.response.json();
      pm.collectionVariables.set("room_id", json.id);
