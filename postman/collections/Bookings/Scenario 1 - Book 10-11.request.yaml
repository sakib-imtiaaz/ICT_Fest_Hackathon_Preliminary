$kind: http-request
name: 'Scenario 1 - Book 10:00–11:00'
method: POST
url: '{{base_url}}/bookings'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
body:
  type: json
  content: |-
    {
      "room_id": {{room_id}},
      "start_time": "2026-10-10T10:00:00",
      "end_time": "2026-10-10T11:00:00"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Booking is confirmed", function () {
        const json = pm.response.json();
        pm.expect(json.status).to.eql("confirmed");
      });

      pm.test("Response has id and reference_code", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("id");
        pm.expect(json).to.have.property("reference_code");
        pm.expect(json.id).to.be.a("number");
        pm.expect(json.reference_code).to.be.a("string");
      });

      pm.test("price_cents is 5000 (1hr × 5000 cents/hr)", function () {
        const json = pm.response.json();
        pm.expect(json.price_cents).to.eql(5000);
      });

      pm.test("start_time and end_time are correct", function () {
        const json = pm.response.json();
        pm.expect(json.start_time).to.include("2026-10-10T10:00:00");
        pm.expect(json.end_time).to.include("2026-10-10T11:00:00");
      });

      // Save booking_id for later use
      const json = pm.response.json();
      pm.collectionVariables.set("booking_1_id", json.id);
