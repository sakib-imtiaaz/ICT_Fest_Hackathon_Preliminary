$kind: http-example
name: Register Duplicate User (Idempotent)
order: 2000
request:
  method: POST
  url: '{{base_url}}/auth/register'
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "org_name": "OrgA",
        "username": "alice",
        "password": "password123"
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: json
    content: |-
      {
        "user_id": 1,
        "org_id": 1,
        "username": "alice",
        "role": "admin"
      }
