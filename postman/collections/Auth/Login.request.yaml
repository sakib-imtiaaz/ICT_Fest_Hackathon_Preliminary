$kind: http-request
name: Login
method: POST
url: '{{base_url}}/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "org_name": "OrgA",
      "username": "alice",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response contains access_token and refresh_token", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("access_token");
        pm.expect(json).to.have.property("refresh_token");
        pm.expect(json.token_type).to.eql("bearer");
      });

      // Save tokens for use in Rooms and Bookings requests
      const json = pm.response.json();
      pm.collectionVariables.set("access_token", json.access_token);
      pm.collectionVariables.set("refresh_token", json.refresh_token);
